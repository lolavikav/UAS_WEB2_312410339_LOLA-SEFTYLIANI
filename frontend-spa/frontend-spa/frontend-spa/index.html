<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library Novel Digital - UAS Web 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-tr from-pink-100 via-rose-50 to-purple-100 text-slate-800 min-h-screen antialiased relative overflow-x-hidden">

    <!-- Ornamen Background Estetik tambahan biar gradasinya makin soft -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-pink-200/40 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-purple-200/30 rounded-full blur-[100px] pointer-events-none"></div>

    <div id="app" class="relative z-10">
        <!-- Navbar Glassmorphism bertema Pink-Purple -->
        <nav class="bg-white/40 backdrop-blur-xl border-b border-white/60 p-4 text-slate-700 sticky top-0 z-50 shadow-sm shadow-pink-100/20">
            <div class="container mx-auto max-w-6xl flex justify-between items-center">
                
                <!-- Logo Utama: Gradasi dari Pink Tua ke Ungu -->
                <h1 class="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-purple-600 flex items-center gap-2">
                    <span>📚</span> <router-link to="/">Perpustakaan Lola</router-link>
                </h1>
                
                <!-- Navigasi Menu -->
                <div class="space-x-2 font-bold flex items-center text-sm">
                    <router-link to="/" class="hover:text-pink-600 hover:bg-white/50 px-3 py-2 rounded-xl transition">Katalog</router-link>
                    
                    <template v-if="isLoggedIn">
                        <router-link to="/dashboard" class="hover:text-pink-600 hover:bg-white/50 px-3 py-2 rounded-xl transition">Dashboard Admin</router-link>
                        <router-link to="/kategori" class="hover:text-pink-600 hover:bg-white/50 px-3 py-2 rounded-xl transition">Kategori</router-link>
                        <button @click="logout" class="bg-gradient-to-r from-rose-400 to-pink-500 hover:opacity-90 text-white px-4 py-2 rounded-xl transition shadow-md shadow-pink-200 font-bold">
                            Logout
                        </button>
                    </template>
                    
                    <!-- Tombol Login Admin Gradasi Pink -->
                    <router-link v-else to="/login" class="bg-gradient-to-r from-pink-500 via-rose-500 to-purple-500 text-white hover:opacity-95 px-4 py-2 rounded-xl transition shadow-md shadow-pink-200 font-bold">
                        Login Admin
                    </router-link>
                </div>

            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-6">
            <router-view></router-view>
        </main>
    </div>

    <script src="app.js?v=lola" type="module"></script>
</body>
</html>
